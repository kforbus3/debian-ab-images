# GRUB A/B boot configuration for RAUC.
#
# /boot (and the kernel) is shared; A/B applies to the root filesystem. GRUB's
# prefix lives on the BOOT partition, so /vmlinuz and /initrd.img below refer to
# files on BOOT. The root= parameter selects which root slot to boot. Persistent
# slot state lives in grubenv (written by RAUC via grub-editenv).

set timeout=3
set default=0

if [ -s ${prefix}/grubenv ]; then
    load_env
fi

if [ "${ORDER}" = "" ]; then set ORDER="A B"; fi
if [ "${A_TRY}" = "" ]; then set A_TRY="0"; fi
if [ "${B_TRY}" = "" ]; then set B_TRY="0"; fi

# Pick the first slot in ORDER whose TRY counter is still 0.
for SLOT in ${ORDER}; do
    if [ "${SLOT}" = "A" -a "${A_TRY}" = "0" ]; then
        set default=0
        set A_TRY="1"
        break
    fi
    if [ "${SLOT}" = "B" -a "${B_TRY}" = "0" ]; then
        set default=1
        set B_TRY="1"
        break
    fi
done
save_env A_TRY B_TRY

set CMDLINE="ro quiet console=tty0 console=ttyS0,115200 systemd.show_status=1"

menuentry "Debian A/B - Slot A (rootfs.0)" {
    linux /vmlinuz-__KVER__ root=LABEL=rootfs-a rauc.slot=A ${CMDLINE}
    initrd /initrd.img-__KVER__
}

menuentry "Debian A/B - Slot B (rootfs.1)" {
    linux /vmlinuz-__KVER__ root=LABEL=rootfs-b rauc.slot=B ${CMDLINE}
    initrd /initrd.img-__KVER__
}
