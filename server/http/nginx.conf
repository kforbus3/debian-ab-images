server {
    listen 80 default_server;
    server_name _;
    root /srv/http;
    autoindex on;
    sendfile on;

    # Large image files: stream efficiently, no buffering limits.
    location / {
        add_header Cache-Control "no-cache";
    }

    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
